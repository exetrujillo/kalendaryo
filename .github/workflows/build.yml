name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: REUSE compliance check
        uses: fsfe/reuse-action@v5

  flutter:
    runs-on: ubuntu-latest
    needs: reuse
    steps:
      - uses: actions/checkout@v4

      # Versión de Flutter PINNEADA (no `channel: stable` flotante): garantiza
      # builds reproducibles en el tiempo y evita que un nuevo stable rompa el CI.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - run: flutter pub get

      # Genera el código de drift (app_database.g.dart). Está gitignored, así que
      # DEBE regenerarse aquí antes de analizar/compilar.
      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter analyze
      - run: flutter test

      # --- Verificación de Reproducible Builds ---------------------------------
      # Se construye el APK dos veces (con `flutter clean` entre medias) y se
      # comparan. SOURCE_DATE_EPOCH normaliza marcas de tiempo; el bloque no libre
      # de metadatos de dependencias ya está excluido vía `dependenciesInfo` en
      # build.gradle. Si el pipeline no es determinista, este job FALLA.
      - name: Build
        env:
          SOURCE_DATE_EPOCH: 1
        run: |
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk "$RUNNER_TEMP/build1.apk"

      - name: Clean
        run: flutter clean

      - name: Build
        env:
          SOURCE_DATE_EPOCH: 1
        run: |
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk "$RUNNER_TEMP/build2.apk"

      # Se comparan los contenidos IGNORANDO META-INF/ (la firma): F-Droid
      # reconstruye y re-firma con su propia clave, así que la reproducibilidad se
      # mide sobre el contenido sin firmar, no sobre el bloque de firma.
      - name: Verify reproducibility (signature-agnostic)
        run: |
          mkdir -p "$RUNNER_TEMP/a" "$RUNNER_TEMP/b"
          unzip -q "$RUNNER_TEMP/build1.apk" -d "$RUNNER_TEMP/a" -x 'META-INF/*'
          unzip -q "$RUNNER_TEMP/build2.apk" -d "$RUNNER_TEMP/b" -x 'META-INF/*'
          if diff -r "$RUNNER_TEMP/a" "$RUNNER_TEMP/b"; then
            echo "✅ Build reproducible: contenido idéntico entre dos compilaciones."
          else
            echo "❌ Build NO reproducible: diferencias arriba." >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: kalendaryo-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # 3) Al pushear un tag vX.Y.Z: build firmado con la clave propia (desde secrets)
  #    y publicación como GitHub Release con el APK adjunto.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: flutter
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      # Recompone el keystore y android/key.properties desde los Secrets del repo.
      # Los secrets se enmascaran en el log; las claves se escriben a fichero, no
      # a stdout.
      - name: Configurar firma de release
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          {
            echo "storeFile=$RUNNER_TEMP/release.jks"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > android/key.properties

      - name: Build APK firmado
        run: flutter build apk --release

      - name: Publicar Release con el APK
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
