allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Flutter coloca los artefactos de build fuera de android/ para que `flutter
// clean` los gestione de forma uniforme entre plataformas.
rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
