org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError

# Todas las dependencias son AndroidX puras: Jetifier desactivado para builds
# más rápidos y deterministas (importante para Reproducible Builds en F-Droid).
android.useAndroidX=true
android.enableJetifier=false
