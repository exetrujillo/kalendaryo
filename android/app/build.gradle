plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

// versionCode/versionName provienen de pubspec.yaml (Flutter los inyecta en
// local.properties). La fuente de verdad del applicationId es tool/.app_id.
def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "0.1.0"

// Firma de release OPCIONAL: si existe android/key.properties (no versionado; lo
// crea el CI desde secrets), se firma con esa clave; si no, se cae a debug. Así
// F-Droid y los builds locales siguen compilando sin secrets, y solo el Release
// de GitHub se firma con la clave propia.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { keystoreProperties.load(it) }
}

android {
    namespace = "cl.exetrujillo.kalendaryo"
    // compileSdk 35: lo exigen plugins transitivos (jni, sqlite3_flutter_libs).
    // Es retrocompatible; targetSdk se mantiene en 34 (comportamiento en runtime).
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "cl.exetrujillo.kalendaryo"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 34
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    // Reproducible Builds (F-Droid): por defecto AGP incrusta en el APK un bloque
    // de metadatos de dependencias FIRMADO POR GOOGLE. Es un blob no libre, opaco
    // y NO determinista (varía entre máquinas), que rompería la verificación byte
    // a byte de F-Droid. Lo excluimos por completo.
    dependenciesInfo {
        includeInApk = false
        includeInBundle = false
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
                storeFile = keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                storePassword = keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            // Con key.properties (CI/secrets) firma con la clave de release; si no,
            // con debug (F-Droid re-firma; aquí no se embebe keystore propio).
            // Sin minify/shrink => build reproducible y auditable byte a byte.
            signingConfig = keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Red de seguridad del refresco diario del widget. WorkManager (AndroidX) cae
    // a JobScheduler/AlarmManager: NO requiere Google Play Services ni red.
    implementation "androidx.work:work-runtime-ktx:2.9.0"
}
