name: kalendaryo
description: "Cuenta regresiva de eventos en la pantalla de inicio. 100% local y libre."
publish_to: "none" # No se publica en pub.dev; distribución vía F-Droid.
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Persistencia local cifrada (todo FOSS, sin servicios del SO propietarios)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  sqlcipher_flutter_libs: ^0.6.0 # SQLCipher: cifrado AES-256 de la BD
  flutter_secure_storage: ^9.2.0 # Guarda la clave en el Android Keystore

  # Puente app <-> widget nativo (MIT, sin dependencias de Google)
  home_widget: ^0.6.0

  # Gestión de estado (MIT)
  flutter_riverpod: ^2.5.1

  path_provider: ^2.1.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
